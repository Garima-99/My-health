<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#EEF2F9">
<meta property="og:title" content="My Health - Singhals">
<meta property="og:description" content="Family Health Tracker">
<title>My Health - Singhals</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

/* ══ LIGHT ══ */
body.light{
--bg:#EEF2F9;--bg2:#E4EAF4;--card:#FFFFFF;--card2:#F5F8FC;
--text:#0F1729;--text2:#3D4663;--muted:#7C869B;--muted2:#B0B8C9;
--border:rgba(0,0,0,.06);--bdr2:rgba(0,0,0,.1);
--accent:#4F6DC4;--accent2:#6B8AD9;--abg:rgba(79,109,196,.07);
--green:#2D8F5E;--gbg:rgba(45,143,94,.07);
--red:#C44D4D;--rbg:rgba(196,77,77,.07);
--amber:#B8860B;--ambg:rgba(184,134,11,.07);
--rose:#B85578;--robg:rgba(184,85,120,.07);
--sidebar:#0F1729;
--shadow:0 1px 2px rgba(0,0,0,.03),0 6px 20px rgba(0,0,0,.04);
--shw2:0 2px 12px rgba(0,0,0,.06);
--inp:#F0F3FA;--inpb:#D5DCE9;
}
/* ══ DARK ══ */
body.dark{
--bg:#0F1420;--bg2:#151C2E;--card:#1A2236;--card2:#1F2940;
--text:#E2E6F0;--text2:#9CA3B8;--muted:#5E6A84;--muted2:#3E4A64;
--border:rgba(255,255,255,.05);--bdr2:rgba(255,255,255,.08);
--accent:#7B9AE8;--accent2:#96AFF0;--abg:rgba(123,154,232,.1);
--green:#5CCB8D;--gbg:rgba(92,203,141,.08);
--red:#E88080;--rbg:rgba(232,128,128,.08);
--amber:#F0C850;--ambg:rgba(240,200,80,.08);
--rose:#E88DB0;--robg:rgba(232,141,176,.08);
--sidebar:#0A0F1A;
--shadow:0 1px 2px rgba(0,0,0,.15),0 6px 20px rgba(0,0,0,.2);
--shw2:0 2px 12px rgba(0,0,0,.25);
--inp:rgba(255,255,255,.04);--inpb:rgba(255,255,255,.08);
}

body{
font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);
overflow-x:hidden;-webkit-font-smoothing:antialiased;transition:background .4s,color .3s;
}

/* Organic background blobs */
body::before{content:'';position:fixed;width:500px;height:500px;border-radius:50%;
background:var(--accent);opacity:.035;filter:blur(100px);top:-120px;right:-80px;pointer-events:none;z-index:0;
animation:float1 25s ease-in-out infinite}
body::after{content:'';position:fixed;width:400px;height:400px;border-radius:50%;
background:var(--rose);opacity:.03;filter:blur(100px);bottom:-100px;left:-60px;pointer-events:none;z-index:0;
animation:float1 30s ease-in-out infinite reverse}
@keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,20px)}}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:10px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes softPop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}

/* ══ SIDEBAR ══ */
.sb{position:fixed;left:0;top:0;bottom:0;width:244px;background:var(--sidebar);
display:flex;flex-direction:column;z-index:100;transition:transform .35s cubic-bezier(.4,0,.2,1);
border-right:1px solid rgba(255,255,255,.04)}

.sb-top{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-logo{display:flex;align-items:center;gap:11px}
.sb-icon{width:40px;height:40px;border-radius:50%;background:linear-gradient(140deg,var(--accent),var(--accent2));
display:flex;align-items:center;justify-content:center;font-size:19px;
box-shadow:0 4px 14px rgba(79,109,196,.25)}
.sb-top h1{font-size:17px;font-weight:800;color:#fff;letter-spacing:-.3px;line-height:1.2}
.sb-top small{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:1.2px;text-transform:uppercase;font-weight:700}

.sb-prof{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-pbtn{width:100%;display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:14px;
border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);cursor:pointer;
color:#fff;font:600 13px/1.3 'Nunito',sans-serif;text-align:left;transition:background .2s}
.sb-pbtn:hover{background:rgba(255,255,255,.07)}
.sb-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(140deg,var(--accent),var(--accent2));
display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0}

.sb nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:2px}
.nv{display:flex;align-items:center;gap:12px;padding:10px 15px;border-radius:14px;border:none;
cursor:pointer;font:600 13.5px/1 'Nunito',sans-serif;background:transparent;
color:rgba(255,255,255,.38);transition:all .25s;text-align:left;width:100%}
.nv:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.6)}
.nv.on{background:var(--accent);color:#fff;box-shadow:0 4px 16px rgba(79,109,196,.3)}
.nv .ic{font-size:18px;width:22px;text-align:center}

.sb-ft{padding:12px 14px;border-top:1px solid rgba(255,255,255,.06)}
.thb{width:100%;display:flex;align-items:center;justify-content:space-between;padding:9px 13px;
border-radius:12px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);
cursor:pointer;color:rgba(255,255,255,.4);font:600 12px 'Nunito',sans-serif;transition:all .2s}
.thb:hover{background:rgba(255,255,255,.06)}
.tg{width:36px;height:20px;border-radius:10px;background:rgba(255,255,255,.1);position:relative;transition:background .3s}
.tg.on{background:var(--accent)}
.tgk{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;
transition:transform .25s cubic-bezier(.4,0,.2,1);box-shadow:0 1px 4px rgba(0,0,0,.15)}
.tg.on .tgk{transform:translateX(16px)}

/* ══ MOBILE ══ */
.mh{display:none;position:fixed;top:0;left:0;right:0;height:56px;
background:var(--card);border-bottom:1px solid var(--border);z-index:90;
align-items:center;justify-content:space-between;padding:0 16px;
backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.mb{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text);padding:4px}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:99;backdrop-filter:blur(3px)}
@media(max-width:767px){
.sb{transform:translateX(-100%)}.sb.open{transform:translateX(0);box-shadow:4px 0 30px rgba(0,0,0,.25)}
.ov.open{display:block}.mh{display:flex}
.mn{margin-left:0!important;padding:66px 16px 28px!important}
}

/* ══ MAIN ══ */
.mn{margin-left:244px;padding:28px 34px;max-width:880px;position:relative;z-index:1}
@media(max-width:900px){.mn{padding:28px 18px}}

/* ══ CARDS ══ */
.cd{background:var(--card);border-radius:22px;padding:22px;border:1px solid var(--border);
box-shadow:var(--shadow);margin-bottom:14px;transition:transform .2s ease}

/* ══ STATS ══ */
.sgs{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:26px}
.sg{background:var(--card);border-radius:22px;padding:20px;border:1px solid var(--border);
box-shadow:var(--shadow);cursor:pointer;transition:all .25s ease;position:relative;overflow:hidden}
.sg:hover{transform:translateY(-3px);box-shadow:var(--shw2)}
.sg:active{transform:scale(.98)}
.sg-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sg-ic{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:21px}
.sg-ar{font-size:13px;color:var(--muted);transition:transform .2s}
.sg:hover .sg-ar{transform:translateX(3px)}
.sg-v{font-size:28px;font-weight:800;letter-spacing:-.8px}
.sg-l{font-size:12px;color:var(--muted);font-weight:600;margin-top:3px}
.sg-s{font-size:10.5px;font-weight:700;margin-top:7px;display:inline-block;padding:3px 10px;border-radius:20px}

/* ══ FORMS ══ */
.fl{margin-bottom:14px}
.fl label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;
text-transform:uppercase;letter-spacing:.7px}
.fl input,.fl select,.fl textarea{width:100%;padding:11px 15px;border-radius:14px;
border:1.5px solid var(--inpb);background:var(--inp);color:var(--text);
font:14px/1.4 'Nunito',sans-serif;outline:none;transition:all .2s}
.fl input:focus,.fl select:focus,.fl textarea:focus{border-color:var(--accent);
box-shadow:0 0 0 3px var(--abg)}
.fl textarea{resize:vertical;min-height:58px}

/* ══ BUTTONS ══ */
.bt{padding:10px 20px;border-radius:14px;font:600 13.5px 'Nunito',sans-serif;
cursor:pointer;transition:all .2s;border:none;display:inline-flex;align-items:center;gap:6px}
.bp{background:var(--accent);color:#fff;box-shadow:0 3px 12px rgba(79,109,196,.2)}
.bp:hover{filter:brightness(1.06);transform:translateY(-1px)}
.b2{background:var(--inp);color:var(--text);border:1.5px solid var(--inpb)}
.b2:hover{border-color:var(--accent)}
.bt:disabled{opacity:.35;cursor:not-allowed}
.bf{width:100%;justify-content:center}
.bsm{padding:6px 12px;font-size:12px;border-radius:10px}
.bx{background:none;border:none;cursor:pointer;color:var(--red);font-size:14px;padding:4px;opacity:.45;transition:opacity .2s}
.bx:hover{opacity:1}

/* Upload */
.up{border:2px dashed var(--inpb);border-radius:18px;padding:26px 18px;text-align:center;
cursor:pointer;transition:all .25s;background:var(--inp);position:relative}
.up:hover,.up.drag{border-color:var(--accent);background:var(--abg)}
.up input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.th{width:68px;height:68px;object-fit:cover;border-radius:14px;border:2px solid var(--border);
cursor:pointer;transition:transform .2s}.th:hover{transform:scale(1.06)}

/* ══ MODAL ══ */
.mbg{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.4);backdrop-filter:blur(6px);
display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .15s}
.mdl{background:var(--card);border-radius:26px;padding:28px;width:100%;max-width:480px;
max-height:84vh;overflow-y:auto;box-shadow:0 20px 70px rgba(0,0,0,.18);
border:1px solid var(--border);animation:rise .3s cubic-bezier(.4,0,.2,1)}
.mdl.w{max-width:580px}
.mt{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.mt h3{font-size:20px;font-weight:800;letter-spacing:-.3px}
.mx{background:var(--inp);border:none;border-radius:50%;width:34px;height:34px;cursor:pointer;
font-size:15px;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .2s}
.mx:hover{background:var(--rbg);color:var(--red)}

/* Badge/Chip */
.bd{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.3px}
.cps{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
.cp{padding:7px 16px;border-radius:24px;border:1.5px solid var(--bdr2);background:var(--card);
color:var(--muted);font:600 12px 'Nunito',sans-serif;cursor:pointer;transition:all .2s;white-space:nowrap}
.cp:hover{border-color:var(--accent);color:var(--text)}
.cp.on{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 3px 12px rgba(79,109,196,.2)}

/* Visit/Med */
.vc{border-left:3px solid var(--accent);border-radius:22px}
.vg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
@media(max-width:500px){.vg{grid-template-columns:1fr}}
.vl{background:var(--card2);padding:10px 13px;border-radius:12px;font-size:13px;line-height:1.4}
.vl strong{display:block;font-size:10px;color:var(--muted);margin-bottom:2px;letter-spacing:.5px;text-transform:uppercase;font-weight:700}
.ma{border-left:3px solid var(--green)}.mi{border-left:3px solid var(--border);opacity:.45}

/* Profile */
.pav{width:66px;height:66px;border-radius:50%;background:linear-gradient(140deg,var(--accent),var(--accent2));
display:flex;align-items:center;justify-content:center;font-size:27px;color:#fff;font-weight:800;flex-shrink:0;
box-shadow:0 6px 20px rgba(79,109,196,.2)}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.pc{background:var(--card2);padding:14px 16px;border-radius:16px;border:1px solid var(--border)}
.pc small{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}

/* Chart */
.cbox{width:100%;height:155px;position:relative;margin:8px 0}
.cbox canvas{display:block;width:100%!important;height:100%!important}

/* Empty */
.em{text-align:center;padding:50px 20px;animation:rise .4s ease}
.em-i{font-size:46px;margin-bottom:14px}
.em h3{font-weight:800;margin-bottom:7px;font-size:19px}
.em p{color:var(--muted);font-size:13.5px;margin-bottom:22px;max-width:300px;margin-left:auto;margin-right:auto;line-height:1.5}

/* Profile picker */
.pp{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:16px;margin-bottom:8px;
cursor:pointer;border:1.5px solid var(--border);background:var(--card2);transition:all .2s}
.pp:hover{border-color:var(--accent);background:var(--abg)}
.pp.sel{border:2px solid var(--accent);background:var(--abg)}

/* Activity */
.ai{display:flex;align-items:center;gap:13px;padding:12px 15px;border-radius:16px;
background:var(--card2);margin-bottom:7px;border:1px solid var(--border);cursor:pointer;transition:all .2s}
.ai:hover{background:var(--abg);border-color:var(--accent);transform:translateX(3px)}

/* Section */
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;flex-wrap:wrap;gap:10px}
.stl{font-size:22px;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:9px}

/* Welcome */
.wl{margin-bottom:26px;animation:rise .4s ease}
.wl h2{font-size:28px;font-weight:900;letter-spacing:-.8px;line-height:1.15}
.wl p{color:var(--muted);font-size:14px;margin-top:5px}

/* Entry row */
.er{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;
border-radius:14px;background:var(--card);margin-bottom:5px;border:1px solid var(--border);
font-size:13px;transition:all .15s}
.er:hover{background:var(--card2)}
.mn-f{font-family:'DM Mono',monospace;font-size:11px}

/* Lightbox */
.lb{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);
display:flex;align-items:center;justify-content:center;padding:20px;cursor:pointer;animation:fadeIn .15s}
.lb img{max-width:92vw;max-height:88vh;border-radius:18px;box-shadow:0 16px 60px rgba(0,0,0,.4)}

/* Section label */
.sl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.9px;margin-bottom:10px}

/* Graph info */
.gi{padding:10px 14px;border-radius:14px;font-size:12px;font-weight:500;line-height:1.55;margin-top:8px}

/* Stagger animation for children */
.stagger>*{animation:rise .35s ease both}
.stagger>*:nth-child(1){animation-delay:.05s}
.stagger>*:nth-child(2){animation-delay:.1s}
.stagger>*:nth-child(3){animation-delay:.15s}
.stagger>*:nth-child(4){animation-delay:.2s}
.stagger>*:nth-child(5){animation-delay:.25s}

/* Organic decorative circle on cards */
.org::after{content:'';position:absolute;width:80px;height:80px;border-radius:50%;
background:var(--accent);opacity:.04;right:-20px;bottom:-20px;pointer-events:none}
</style>
</head>

const DT=["General Physician","Endocrinologist","Neurologist","Gynecologist","Cardiologist","Dermatologist","Orthopedic","Ophthalmologist","ENT Specialist","Psychiatrist","Urologist","Gastroenterologist","Pulmonologist","Oncologist","Other"];
const DI={"General Physician":"🩺","Endocrinologist":"🦋","Neurologist":"🧠","Gynecologist":"♀️","Cardiologist":"❤️","Dermatologist":"🧴","Orthopedic":"🦴","Ophthalmologist":"👁️","ENT Specialist":"👂","Psychiatrist":"🧘","Urologist":"💧","Gastroenterologist":"🫁","Pulmonologist":"🌬️","Oncologist":"🎗️","Other":"⚕️"};

function gat(){return{...BTC,...(gp()?.ct||{})};}

function h(t,a,...c){const e=document.createElement(t);if(a)Object.entries(a).forEach(([k,v])=>{if(k==="className")e.className=v;else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);else if(k==="style"&&typeof v==="object")Object.assign(e.style,v);else e.setAttribute(k,v)});c.flat(Infinity).forEach(c=>{if(c==null||c===false)return;e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c)});return e}
